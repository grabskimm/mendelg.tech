<div id="partners" class="partners-subsection">
    <h3 class="subsection-title">Contributions</h3>
    <p class="partners-intro">Repositories and projects I've contributed to in the past.</p>
    <div class="partners-grid">
        {{ range .Site.Params.partners }}
        {{ if and .url (ne .url "#") }}
        <a class="partner-card" href="{{ .url }}" target="_blank" rel="noopener noreferrer">
            <span class="partner-name">{{ .name }}</span>
            {{ with .note }}<span class="partner-note">{{ . }}</span>{{ end }}
            <i class="fas fa-arrow-right partner-arrow" aria-hidden="true"></i>
        </a>
        {{ else }}
        <div class="partner-card partner-card--placeholder" title="Coming soon">
            <span class="partner-name">{{ .name }}</span>
            {{ with .note }}<span class="partner-note">{{ . }}</span>{{ end }}
        </div>
        {{ end }}
        {{ end }}
    </div>
</div>
