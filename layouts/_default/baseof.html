<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    {{ partial "header.html" . }}
    <main>
        <div class="container">
            {{ block "main" . }}{{ end }}
        </div>
    </main>
    {{ partial "footer.html" . }}

    <!-- Booking widget — opens availability.mendelg.tech/book in a popup -->
    <button type="button" id="book-badge" class="book-badge" aria-haspopup="dialog" aria-controls="book-modal">
        <i class="fas fa-calendar-check" aria-hidden="true"></i>
        <span>Schedule time with me</span>
    </button>
    <div id="book-modal" class="book-modal" role="dialog" aria-modal="true" aria-label="Book a time" hidden>
        <div class="book-modal__backdrop" data-book-close></div>
        <div class="book-modal__dialog">
            <button type="button" class="book-modal__close" data-book-close aria-label="Close booking">&times;</button>
            <iframe data-src="https://availability.mendelg.tech/book"
                    title="Book a time" loading="lazy"></iframe>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
